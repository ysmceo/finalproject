<form id="trackBookingForm" class="booking-form">
        <div class="form-group">
          <label for="trackCode">Tracking Code *</label>
          <input type="text" id="trackCode" placeholder="e.g. BOOK-ABC12345" required>
        </div>

        <div class="form-group">
          <label for="trackEmail">Booking Email *</label>
          <input type="email" id="trackEmail" placeholder="you@example.com" required>
        </div>

        <button type="submit" class="submit-btn">Check Booking Status</button>
      </form>
