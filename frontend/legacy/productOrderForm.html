<form id="productOrderForm" class="booking-form">
        <div class="form-group">
          <label for="productOrderName">Full Name *</label>
          <input type="text" id="productOrderName" required>
        </div>

        <div class="form-group">
          <label for="productOrderEmail">Email Address *</label>
          <input type="email" id="productOrderEmail" required>
        </div>

        <div class="form-group">
          <label for="productOrderPhone">Phone Number *</label>
          <input type="tel" id="productOrderPhone" required>
        </div>

        <div class="form-group">
          <label for="productOrderAddress">Delivery Address *</label>
          <textarea id="productOrderAddress" rows="3" placeholder="Enter full delivery address" required></textarea>
          <div class="address-lookup-actions">
            <button type="button" id="productOrderAddressMapBtn" class="address-map-btn">🗺️ Open map</button>
            <small id="productOrderAddressLookupStatus" class="form-help-text-tight"></small>
          </div>
          <div id="productOrderAddressSuggestions" class="address-suggestions hidden" aria-live="polite"></div>
        </div>

        <div class="form-group">
          <label for="productOrderPaymentMethod">Payment Method *</label>
          <select id="productOrderPaymentMethod" required>
            <option value="">Select payment method...</option>
            <option value="Cash">💵 Cash</option>
            <option value="Bank Transfer">🏦 Bank Transfer</option>
            <option value="Credit Card">💳 Credit Card</option>
            <option value="Debit Card">💳 Debit Card</option>
            <option value="USSD">📱 USSD</option>
          </select>
        </div>

        <div class="form-group">
          <label for="productOrderDeliverySpeed">Delivery Speed *</label>
          <select id="productOrderDeliverySpeed" required>
            <option value="standard">Standard Delivery</option>
            <option value="express">Express Delivery (Faster)</option>
          </select>
          <small class="form-help-text-tight">Express orders are prioritized in courier dispatch and auto-delivery progression.</small>
        </div>

        <div class="form-group">
          <label>🛍️ Select Products *</label>
          <div id="productOrderPicker" class="booking-product-picker">
            <div class="booking-product-empty">Products will load here...</div>
          </div>
          <div id="productOrderSummaryCard" class="order-summary-card" aria-live="polite">
            <div class="order-summary-row">
              <span>Items Subtotal</span>
              <strong id="productOrderSubtotal">₦0</strong>
            </div>
            <div class="order-summary-row">
              <span>Delivery Fee</span>
              <strong id="productOrderDeliveryFee">₦0</strong>
            </div>
            <div class="order-summary-row order-summary-row-total">
              <span>Estimated Grand Total</span>
              <strong id="productOrderGrandTotal">₦0</strong>
            </div>
            <small id="productOrderSummary" class="form-help-text-tight order-summary-text">Select product(s) to see your live total.</small>
          </div>
        </div>

        <button type="submit" class="submit-btn">Place Product Order</button>
        <button type="button" id="clearProductOrderBtn" class="submit-btn submit-btn-secondary">Clear Form</button>
      </form>
