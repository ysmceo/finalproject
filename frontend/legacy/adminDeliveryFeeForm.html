<form id="productDeliveryFeeForm" class="product-form">
            <div class="product-form-grid">
              <input type="number" id="adminStandardDeliveryFee" placeholder="Standard Delivery Fee (₦)" min="0" step="1" required>

            <div id="productDeliveryFeeMessage" class="message"></div>
          </form>
