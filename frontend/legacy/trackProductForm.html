<form id="trackProductForm" class="booking-form">
        <div class="form-group">
          <label for="trackProductCode">Product Order Code *</label>
          <input type="text" id="trackProductCode" placeholder="e.g. ORD-MA4N7X2" required>
        </div>

        <div class="form-group">
          <label for="trackProductEmail">Order Email *</label>
          <input type="email" id="trackProductEmail" placeholder="you@example.com" required>
        </div>

        <button type="submit" class="submit-btn">Check Product Order Status</button>
      </form>
